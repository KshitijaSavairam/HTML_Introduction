<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction about HTML5</title>
    <style>
        div{
            background-color: coral;
        }
        span{
            background-color: cornflowerblue;
        }
    </style>
</head>
<body>
    
    <!-- heading tags -->
     <h1>Heading 1</h1>
     <h2>Heading 1</h2>
     <h3>Heading 1</h3>
     <h4>Heading 1</h4>
     <h5>Heading 1</h5>
     <h6>Heading 1</h6>

    <hr>

    <!-- paragraph tag and pre tag -->
     <p>This is the normal paragraph!</p>

     <pre>
        This paragraph is written
        using "pre" tag:)
     </pre>

    <hr>

    <!-- div and span tag -->
     <div>This is div</div>
     <span>This is span</span>

    <hr>

    <!-- Links -->
     <a href="www.google.com">Search on Google</a> <br> <br>
     <a href="www.youtube.com">Watch on YouTube</a>

    <hr>


    <!-- images = static & absolute -->
     <h3>Static image = </h3>
     <img src="./image.png" alt="" height="250" width="250">

     <h3>Dynamic image = </h3>
     <img src="https://img.magnific.com/free-psd/3d-rendered-html-file-icon_84443-57041.jpg?semt=ais_hybrid&w=740&q=80" alt="" height="250" width="250">


     <hr>
    

</body>
</html>
